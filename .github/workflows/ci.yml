name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e layerbrain-python
      - name: Check shared versions
        run: python scripts/check_versions.py
      - name: Run SDK tests
        run: python -m unittest discover -s layerbrain-python/tests -v

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: layerbrain-node/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: layerbrain-node
      - name: Check generated Node SDK
        run: |
          npm run generate:resources
          npm run generate:api-docs
          git diff --exit-code -- src/client.ts src/resources/resources.ts api.md
        working-directory: layerbrain-node
      - name: Build
        run: npm run build
        working-directory: layerbrain-node
      - name: Test
        run: npm test
        working-directory: layerbrain-node
