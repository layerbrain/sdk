name: Publish Packages

on:
  push:
    tags:
      - "python-v*"
      - "node-v*"
      - "cli-v*"

permissions:
  contents: write
  id-token: write

jobs:
  cli-github-release:
    if: startsWith(github.ref_name, 'cli-v')
    runs-on: ubuntu-latest
    steps:
      - name: Create or verify GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Layerbrain $GITHUB_REF_NAME" \
            --verify-tag \
            || gh release view "$GITHUB_REF_NAME"

  python-sdk:
    if: startsWith(github.ref_name, 'python-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Check shared versions
        run: python scripts/check_versions.py --release-tag "$GITHUB_REF_NAME"
      - name: Build Python SDK
        run: |
          python -m build --sdist --wheel
          python -m twine check dist/*
        working-directory: layerbrain-python
      - name: Publish Python SDK to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: layerbrain-python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  node-sdk:
    if: startsWith(github.ref_name, 'node-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: layerbrain-node/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check shared versions
        run: python scripts/check_versions.py --release-tag "$GITHUB_REF_NAME"
      - name: Install dependencies
        run: npm ci
        working-directory: layerbrain-node
      - name: Check generated Node SDK
        run: |
          npm run generate:resources
          npm run generate:api-docs
          git diff --exit-code -- src/client.ts src/resources/resources.ts api.md
        working-directory: layerbrain-node
      - name: Build and test Node SDK
        run: npm run check
        working-directory: layerbrain-node
      - name: Publish Node SDK to npm
        run: npm publish --provenance
        working-directory: layerbrain-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cli-artifact:
    if: startsWith(github.ref_name, 'cli-v')
    needs: cli-github-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15-intel, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check shared versions
        run: python scripts/check_versions.py --release-tag "$GITHUB_REF_NAME"
      - name: Build CLI artifact
        run: cli/scripts/build-artifact.sh
      - name: Upload CLI artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" cli/dist/layerbrain-*.tar.gz --clobber
