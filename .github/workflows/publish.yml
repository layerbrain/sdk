name: Publish Packages

on:
  push:
    tags:
      - "python-v*"
      - "node-v*"

permissions:
  contents: write
  id-token: write

jobs:
  python-sdk:
    if: startsWith(github.ref_name, 'python-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Check shared versions
        run: python scripts/check_versions.py --release-tag "$GITHUB_REF_NAME"
      - name: Build Python SDK
        run: |
          python -m build --sdist --wheel
          python -m twine check dist/*
        working-directory: layerbrain-python
      - name: Publish Python SDK to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: layerbrain-python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  node-sdk:
    if: startsWith(github.ref_name, 'node-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: layerbrain-node/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check shared versions
        run: python scripts/check_versions.py --release-tag "$GITHUB_REF_NAME"
      - name: Install dependencies
        run: npm ci
        working-directory: layerbrain-node
      - name: Check generated Node SDK
        run: |
          npm run generate:resources
          npm run generate:api-docs
          git diff --exit-code -- src/client.ts src/resources/resources.ts api.md
        working-directory: layerbrain-node
      - name: Build and test Node SDK
        run: npm run check
        working-directory: layerbrain-node
      - name: Publish Node SDK to npm
        run: npm publish --provenance
        working-directory: layerbrain-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
